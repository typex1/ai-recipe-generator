AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Recipe Suggestion API using Amazon Bedrock with Claude 3

Resources:
  RecipeSuggestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: lambda_function.lambda_handler
      Runtime: python3.9
      Architectures:
        - x86_64
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          LOG_LEVEL: INFO
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: 'arn:aws:bedrock:*:*:model/anthropic.claude-3-sonnet-20240229-v1:0'
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /recipe
            Method: post

  RecipeApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref RecipeSuggestionFunction
      Principal: apigateway.amazonaws.com

Outputs:
  RecipeSuggestionApi:
    Description: "API Gateway endpoint URL for the recipe suggestion service"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/recipe"
  
  RecipeSuggestionFunction:
    Description: "Recipe Suggestion Lambda Function ARN"
    Value: !GetAtt RecipeSuggestionFunction.Arn